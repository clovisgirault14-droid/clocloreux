<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clocloreux Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(
        ellipse at top left,
        #6b7f92 0%,
        #3a4a55 25%,
        #1a1a1a 55%,
        #000000 100%
      );
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background-color: #E8821A;
      border-radius: 50px;
      margin: 18px 24px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .nav-icon {
      background: none;
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      width: 48px;
      height: 48px;
      transition: transform 0.15s ease;
    }

    .nav-icon:hover {
      transform: scale(1.15);
    }

    .nav-btn {
      background-color: #000000;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background-color: #222;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 100px);
      text-align: center;
      padding: 1rem;
    }

    .welcome-title {
      font-size: clamp(2rem, 7vw, 6rem);
      font-weight: 900;
      color: #E8821A;
      line-height: 1.2;
      text-transform: uppercase;
    }

    /* ── TABLETTE (max 768px) ── */
    @media (max-width: 768px) {
      .navbar {
        margin: 12px 14px;
        padding: 8px 12px;
        gap: 6px;
      }

      .nav-center {
        gap: 6px;
      }

      .nav-btn {
        padding: 8px 14px;
        font-size: 0.85rem;
      }

      .nav-icon {
        font-size: 1.5rem;
        width: 38px;
        height: 38px;
      }
    }

    /* ── MOBILE (max 480px) ── */
    @media (max-width: 480px) {
      .navbar {
        margin: 10px 10px;
        padding: 6px 10px;
        gap: 4px;
        border-radius: 40px;
      }

      .nav-left {
        gap: 2px;
      }

      .nav-center {
        gap: 4px;
      }

      .nav-btn {
        padding: 6px 8px;
        font-size: 0.65rem;
        border-radius: 4px;
      }

      .nav-icon {
        font-size: 1.2rem;
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <button class="nav-icon" title="Actualiser" onclick="location.reload()">&#x27F3;</button>
      <a href="index.html" class="nav-icon" title="Accueil">&#x2302;</a>
    </div>

    <div class="nav-center">
      <button class="nav-btn" id="btn-games">GAMES</button>
      <button class="nav-btn" id="btn-codes">CODES</button>
      <button class="nav-btn" id="btn-others">OTHERS</button>
    </div>

    <div class="nav-right">
      <button class="nav-icon" id="btn-settings" title="Paramètres">&#x2699;</button>
    </div>
  </nav>

  <main class="hero">
    <h1 class="welcome-title">WELCOME TO THE<br>CLOCLOREUX WEBSITE</h1>
  </main>

  <script>
    document.getElementById('btn-games').addEventListener('click', function () {});
    document.getElementById('btn-codes').addEventListener('click', function () {});
    document.getElementById('btn-others').addEventListener('click', function () {});
    document.getElementById('btn-settings').addEventListener('click', function () {});
  </script>

</body>
</html>
